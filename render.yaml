services:
  - type: web
    name: kalshi-btc-updown-api
    runtime: docker
    plan: starter
    healthCheckPath: /health
    maxShutdownDelaySeconds: 30
    autoDeployTrigger: commit
    disk:
      name: trading-state
      mountPath: /var/data
      sizeGB: 1
    envVars:
      - key: NODE_ENV
        value: production
      - key: HOST
        value: 0.0.0.0
      - key: TRADING_STATE_FILE
        value: /var/data/trading_state.json
      - key: FRONTEND_ORIGIN
        sync: false
      - key: LLAMA_API_KEY
        sync: false
      - key: NVIDIA_NIM_BASE_URL
        value: https://integrate.api.nvidia.com/v1
      - key: NVIDIA_LLAMA_MODEL
        value: meta/llama-3.3-70b-instruct
      - key: NVIDIA_NEMOTRON_MODEL
        value: nvidia/llama-3.3-nemotron-super-49b-v1.5
      - key: KALSHI_ENV
        value: prod
      - key: KALSHI_API_KEY_ID
        sync: false
      - key: KALSHI_PRIVATE_KEY
        sync: false
      - key: POLYMARKET_PRIVATE_KEY
        sync: false
      - key: POLYMARKET_API_KEY
        sync: false
      - key: POLYMARKET_API_SECRET
        sync: false
      - key: POLYMARKET_API_PASSPHRASE
        sync: false
      - key: POLYMARKET_FUNDER_ADDRESS
        sync: false
      - key: POLYMARKET_SIGNATURE_TYPE
        value: "3"
