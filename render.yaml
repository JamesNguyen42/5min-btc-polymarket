services:
  - type: web
    name: kalshi-btc-updown-api
    runtime: docker
    plan: starter
    healthCheckPath: /health
    autoDeployTrigger: commit
    disk:
      name: trading-state
      mountPath: /var/data
      sizeGB: 1
    envVars:
      - key: HOST
        value: 0.0.0.0
      - key: TRADING_STATE_FILE
        value: /var/data/trading_state.json
      - key: TRADE_LEDGER_FILE
        value: /var/data/trading_ledger.jsonl
      - key: QUOTE_LEDGER_FILE
        value: /var/data/kalshi_quotes.jsonl
      - key: KALSHI_FEE_RATE
        value: "0.07"
      - key: FRONTEND_ORIGIN
        sync: false
      - key: KALSHI_ENV
        value: prod
      - key: KALSHI_API_KEY_ID
        sync: false
      - key: KALSHI_PRIVATE_KEY
        sync: false
